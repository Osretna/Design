<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI Video Designer Suite - ذكي وبسيط</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/isometric/192/ai.png" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body class="bg-slate-950 text-slate-100 overflow-x-hidden antialiased select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker immediately on startup -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
